version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

linters:
  default: none
  exclusions:
    # Keep doc comment warnings active while preserving repository-specific lll/dupl exclusions.
    presets: []
    rules:
    - path: "api/*"
      linters:
        - lll
    - path: "internal/*"
      linters:
        - dupl
        - lll
    - path: ".*_test\\.go"
      linters:
        - goconst
        - prealloc
    - path: "test/.*\\.go"
      text: "should not use dot imports"
      linters:
        - staticcheck
    - path: ".*_test\\.go"
      text: "Requeue is deprecated"
      linters:
        - staticcheck
    - path: "test/.*\\.go"
      text: "Requeue is deprecated"
      linters:
        - staticcheck
  enable:
    - dupl
    - errcheck
    - copyloopvar
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    revive:
      rules:
        - name: comment-spacings

formatters:
  enable:
    - gofmt
    - goimports
